name: DevSecOps Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ----------------------------------------------------
  # STEP 1: BUILD
  # ----------------------------------------------------
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies & Build
        run: |
          npm ci
          npm run build --if-present 

  # ----------------------------------------------------
  # STEP 2: SAST (Static Application Security Testing)
  # ----------------------------------------------------
  sast_semgrep:
    name: SAST - Semgrep Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep semgrep scan --config=auto --error

  sast_sonarqube:
    name: SAST - SonarQube Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 
        with:
          args: >
            -Dsonar.organization=sunnycloudhust
            -Dsonar.projectKey=sunnycloudhust_nodejs-devsecops
            -Dsonar.qualitygate.wait=true
            -Dsonar.coverage.exclusions=index.js

  # ----------------------------------------------------
  # STEP 3: SCA (Software Composition Analysis)
  # ----------------------------------------------------
  sca_snyk:
    name: SCA - Snyk Dependency Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }} 
        with:
          args: --severity-threshold=high


  # ----------------------------------------------------
  # STEP 4: DAST (Dynamic Application Security Testing)
  # ----------------------------------------------------
  dast_owasp_zap:
    name: DAST - OWASP ZAP Scan
    needs: [sast_semgrep, sast_sonarqube, sca_snyk] 
    runs-on: ubuntu-latest
    
    # 1. SỬA LỖI 403/410: Cấp quyền ghi Issue cho ZAP
    permissions:
      issues: write
      contents: read
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Start Application in Background
        run: |
          npm ci
          
          # Khởi chạy app ngầm và ghi toàn bộ log ra file app.log
          npm start > app.log 2>&1 & 
          
          echo "Đang chờ ứng dụng khởi động tại cổng 3000..."
          for i in {1..15}; do
            if nc -z localhost 3000; then
              echo "Ứng dụng đã khởi động thành công và đang mở cổng 3000!"
              break
            fi
            sleep 1
          done

          # ĐOẠN KHÓA CỐT LÕI ĐỂ DEBUG: 
          # Nếu sau 15 giây vẫn không thấy cổng 3000 mở, in toàn bộ file log ra màn hình và bắt job dừng lại
          if ! nc -z localhost 3000; then
            echo "=== LỖI KHỞI ĐỘNG: ỨNG DỤNG BỊ SẬP. DƯỚI ĐÂY LÀ LOG CHI TIẾT ==="
            cat app.log
            exit 1
          fi
