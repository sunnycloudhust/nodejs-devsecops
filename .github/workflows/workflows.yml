name: DevSecOps Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ----------------------------------------------------
  # STEP 1: BUILD
  # ----------------------------------------------------
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies & Build
        run: |
          npm ci
          npm run build --if-present 

  # ----------------------------------------------------
  # STEP 2: SAST (Static Application Security Testing)
  # ----------------------------------------------------
  sast_semgrep:
    name: SAST - Semgrep Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep semgrep scan --config=auto --error

  sast_sonarqube:
    name: SAST - SonarQube Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 
        with:
          args: >
            -Dsonar.organization=sunnycloudhust
            -Dsonar.projectKey=sunnycloudhust_nodejs-devsecops
            -Dsonar.qualitygate.wait=true
            -Dsonar.coverage.exclusions=index.js

  # ----------------------------------------------------
  # STEP 3: SCA (Software Composition Analysis)
  # ----------------------------------------------------
  sca_snyk:
    name: SCA - Snyk Dependency Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }} 
        with:
          args: --severity-threshold=high


  # ----------------------------------------------------
  # STEP 4: DAST (Dynamic Application Security Testing)
  # ----------------------------------------------------
  dast_owasp_zap:
    name: DAST - OWASP ZAP Scan
    needs: [sast_semgrep, sast_sonarqube, sca_snyk] 
    runs-on: ubuntu-latest
    
    # 1. SỬA LỖI 403/410: Cấp quyền ghi Issue cho ZAP
    permissions:
      issues: write
      contents: read
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Start Application in Background
        run: |
          npm ci
          npm start & 
          npx wait-on http://localhost:3000 

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:3000' 
          fail_action: 'false'
